<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Inloggen — Avar1on's Archive</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-box">
        <img class="login-logo" src="assets/logo.png" alt="Avarion's Archive" />

        <div class="login-tabs">
          <button class="login-tab active" data-mode="login">Inloggen</button>
          <button class="login-tab" data-mode="signup">Account maken</button>
        </div>

        <form id="authForm">
          <label class="login-label" for="email">E-mailadres</label>
          <input
            class="login-input"
            type="email"
            id="email"
            required
            autocomplete="email"
          />

          <label class="login-label" for="password">Wachtwoord</label>
          <div class="password-wrap">
            <input
              class="login-input"
              type="password"
              id="password"
              required
              autocomplete="current-password"
              minlength="6"
            />
            <button
              type="button"
              class="password-toggle"
              id="passwordToggle"
              aria-label="Toon wachtwoord"
            >
              <svg
                class="eye-icon eye-open"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg
                class="eye-icon eye-closed"
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="display: none"
              >
                <path
                  d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>

          <button class="login-submit" type="submit" id="submitBtn">
            Inloggen
          </button>
        </form>

        <p class="login-message" id="loginMessage"></p>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="login.js"></script>
  </body>
</html>
