<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Avar1on's Archive</title>

  <!-- PWA: maakt de site installeerbaar als app op een telefoon -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#131313">
  <link rel="icon" href="assets/icons/favicon.png">
  <!-- iOS leest het manifest niet volledig, dus eigen Apple-tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archive">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

  <link rel="stylesheet" href="style.css?v=3">
  <link rel="stylesheet" href="add-set.css?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="logo" href="index.html">
      <img src="assets/logo.png" alt="Avarion's Archive">
    </a>
    <div class="header-stats">
      <div class="header-stat">
        <div class="val" id="globalPct">0%</div>
        <div class="lbl">Gemiddeld compleet</div>
      </div>
      <div class="header-stat">
        <div class="val" id="globalOwned">0</div>
        <div class="lbl">Kaarten heb ik</div>
      </div>
      <button class="logout-btn" id="logoutBtn">Uitloggen</button>
    </div>
  </header>

  <!-- HERO -->
  <div class="home-hero">
    <img class="hero-logo" src="assets/logo.png" alt="Avarion's Archive — Collect, Preserve, Master">
    <p>Track je Pokémon master sets — elke kaart, elke set, volledig bijgehouden.</p>
  </div>

  <!-- NAVIGATIE GRID -->
  <div class="home-nav-grid">
    <a class="home-nav-card active" href="index.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Mijn Sets</span>
    </a>
    <a class="home-nav-card" href="wishlist.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Wishlist</span>
    </a>
  </div>

  <!-- MAIN CONTENT -->
  <main class="home-content">

    <!-- SERIES FILTER -->
    <div class="series-filter" id="seriesFilter">
      <span class="series-label">Series</span>
      <button class="series-btn active" data-series="all">Alle</button>
      <!-- Extra series-knoppen worden door JavaScript toegevoegd -->
    </div>

    <!-- SETS GRID -->
    <div class="sets-grid" id="setsGrid">
      <div class="loading-grid">Sets laden...</div>
    </div>

  </main>

  <!-- FAB: knop rechtsonder om een set toe te voegen -->
  <button class="add-set-fab" id="addSetFab" aria-label="Set toevoegen" title="Set toevoegen">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- MODAL: zoeken + set toevoegen -->
  <div class="add-set-backdrop" id="addSetBackdrop"></div>
  <div class="add-set-modal" id="addSetModal">
    <div class="add-set-modal-header">
      <h3>Set toevoegen</h3>
      <button class="add-set-close" id="addSetClose" aria-label="Sluiten">&times;</button>
    </div>
    <input
      class="add-set-search"
      id="addSetSearch"
      type="text"
      placeholder="Zoek een set op naam..."
      autocomplete="off"
    >
    <div class="add-set-results" id="addSetResults">
      <div class="add-set-loading">Typ om te zoeken naar een set.</div>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script src="add-set.js"></script>

  <!-- PWA: service worker registreren (maakt installeren mogelijk) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {
        // Stil falen — de site werkt ook prima zonder service worker,
        // dit is alleen nodig voor de "installeer als app"-functie.
      });
    }
  </script>
</body>
</html>
